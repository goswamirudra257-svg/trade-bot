name: Trade Bot

on:
  schedule:
    - cron: '50 3 * * 1-5'
    - cron: '50 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python bot.py
